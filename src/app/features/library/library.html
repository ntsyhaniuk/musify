<div class="library-page">
  @if (list.isLoading()) {
    <p class="library-status">Loading library…</p>
  } @else if (list.error()) {
    <p class="library-status">Could not load this library section. Try again later.</p>
  } @else if (title()) {
    <app-items-list
      [title]="title()"
      [items]="list.value().items"
      [total]="list.value().total"
    />
  }
</div>
